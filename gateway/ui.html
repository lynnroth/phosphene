<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>phosphene</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e8dcc8;font-family:ui-monospace,monospace;font-size:14px;min-height:100vh;padding:12px}
h1{font-size:18px;font-weight:400;letter-spacing:.2em;color:#c8b89a}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid #222;margin-bottom:14px}
.dots{display:flex;gap:8px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:#333;position:relative}
.dot.ok{background:#4caf50}
.dot.warn{background:#ff9800}
.dot-label{font-size:11px;color:#666}
select{background:#1a1a1a;color:#e8dcc8;border:1px solid #333;padding:8px 12px;font-family:inherit;font-size:14px;border-radius:4px;width:100%;margin-bottom:14px;min-height:44px}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.slider-row label{width:72px;color:#888;font-size:13px;flex-shrink:0}
.slider-row input[type=range]{flex:1;accent-color:#c8b89a;height:6px}
.slider-row .val{width:32px;text-align:right;color:#c8b89a;font-size:13px}
.wheel-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;gap:8px}
#color-wheel{width:min(240px,calc(100vw - 40px));aspect-ratio:1;cursor:crosshair;touch-action:none;display:block}
.color-hex{color:#c8b89a;font-size:13px;letter-spacing:.05em}
.section-label{font-size:11px;color:#555;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;margin-top:4px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.preset-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#c8b89a;font-family:inherit;font-size:12px;padding:10px 6px;border-radius:4px;cursor:pointer;min-height:44px;text-align:center;line-height:1.3;transition:background .1s,border-color .1s}
.preset-btn:active{transform:scale(.97)}
.preset-btn.active{border-color:#c8b89a;color:#fff}
.preset-btn.cat-ambient{border-left:3px solid #c8962a}
.preset-btn.cat-dynamic{border-left:3px solid #2a8fc8}
.preset-btn.cat-fire{border-left:3px solid #c84a2a}
.preset-btn.cat-party{border-left:3px solid #8a2ac8}
.preset-btn.cat-electric{border-left:3px solid #a0d0e0}
.preset-btn.cat-theater{border-left:3px solid #c8aa2a}
.statusbar{border-top:1px solid #222;margin-top:8px;padding-top:10px;font-size:12px;color:#555;line-height:1.8}
.statusbar span{color:#888}
.ack-btn{background:#1a1a1a;border:1px solid #333;color:#555;font-family:inherit;font-size:11px;padding:4px 8px;border-radius:10px;cursor:pointer;letter-spacing:.05em}
.ack-btn.on{background:#1a3a1a;border-color:#4caf50;color:#4caf50}
.ep-dot{width:26px;height:46px;border-radius:3px;background:#2a2a2a;color:#555;font-size:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:600;gap:3px;user-select:none;-webkit-tap-highlight-color:transparent}
.ep-dot.green{background:#4caf50;color:#0a1a0a}
.ep-dot.amber{background:#ff9800;color:#1a0e00}
.ep-bat{display:flex;gap:1px}
.ep-bar{width:3px;height:4px;border-radius:1px;background:rgba(0,0,0,0.25)}
.ep-rssi{display:flex;gap:1px;align-items:flex-end;height:9px}
.ep-rssi-bar{width:3px;border-radius:1px 1px 0 0;background:rgba(0,0,0,0.25)}
.ep-popup{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:1px solid #444;padding:14px 16px 18px;font-size:13px;color:#c8b89a;z-index:100;display:none}
.ep-popup-title{font-weight:600;letter-spacing:.1em;margin-bottom:6px;font-size:14px}
.ep-popup-row{color:#888;font-size:12px;line-height:2}
.ep-popup-row span{color:#c8b89a}
</style>
</head>
<body>

<header>
  <h1>phosphene</h1>
  <div class="dots">
    <span class="dot-label">eth</span>
    <div class="dot" id="dot-eth"></div>
    <span class="dot-label">wifi</span>
    <div class="dot" id="dot-wifi"></div>
    <div id="ep-dots" style="display:flex;gap:4px;align-items:center;margin-left:4px"></div>
    <button class="ack-btn" id="ack-btn" onclick="toggleAck()">ACK OFF</button>
  </div>
</header>

<select id="device-sel">
  <option value="0">Broadcast (all devices)</option>
  <option value="1">Device 1</option>
  <option value="2">Device 2</option>
  <option value="3">Device 3</option>
  <option value="4">Device 4</option>
  <option value="5">Device 5</option>
</select>

<div class="slider-row">
  <label>Intensity</label>
  <input type="range" id="sl-int" min="0" max="255" value="200">
  <span class="val" id="val-int">200</span>
</div>
<div class="slider-row">
  <label>Speed</label>
  <input type="range" id="sl-spd" min="0" max="255" value="128">
  <span class="val" id="val-spd">128</span>
</div>

<div class="wheel-wrap">
  <canvas id="color-wheel"></canvas>
  <span class="color-hex" id="col-hex">#ffffff</span>
</div>

<div class="section-label">Presets</div>
<div class="presets" id="presets"></div>

<div class="statusbar">
  <div>Last: <span id="st-last">—</span></div>
  <div>Ethernet: <span id="st-eth">—</span> &nbsp; WiFi: <span id="st-wifi">—</span></div>
</div>

<div class="ep-popup" id="ep-popup">
  <div class="ep-popup-title" id="ep-popup-title"></div>
  <div class="ep-popup-row" id="ep-popup-row1"></div>
  <div class="ep-popup-row" id="ep-popup-row2"></div>
</div>

<script>
const PRESETS=[
  [0,"Blackout","ambient"],[1,"Sparkle","electric"],[2,"Chase","dynamic"],
  [3,"Fade","ambient"],[4,"Solid","ambient"],[5,"Twinkle","electric"],
  [6,"Strobe","electric"],[7,"Meteor","dynamic"],[8,"Fire","fire"],
  [9,"Rainbow","party"],[10,"Lightning","electric"],[11,"Marquee","dynamic"],
  [12,"Candle","ambient"],[13,"Color Wipe","dynamic"],[14,"Heartbeat","fire"],
  [15,"Alarm","fire"],[16,"Comet","dynamic"],[17,"Ripple","theater"],
  [18,"Scanner","dynamic"],[19,"Bubbles","party"],[20,"Campfire","ambient"],
  [21,"Confetti","party"],[22,"Wave","dynamic"],[23,"Flicker","fire"],
  [24,"Theater Chase","theater"],[25,"Rainbow Chase","party"],[26,"Aurora","party"],
  [27,"Wave Pastel","dynamic"]
];

const state={device:0,preset:4,intensity:200,r:255,g:255,b:255,speed:128};
let debounce=null;
let activeBtn=null;
let ackMode=false;
const seenDevices=new Set();
const lastAckStatus={};
let popupDev=null;
let wheelH=0,wheelS=0; // current hue (0-360) and saturation (0-1); start at white

// Build preset grid
const grid=document.getElementById("presets");
PRESETS.forEach(([id,name,cat])=>{
  const btn=document.createElement("button");
  btn.className=`preset-btn cat-${cat}`;
  btn.textContent=name;
  btn.dataset.id=id;
  if(id===state.preset){btn.classList.add("active");activeBtn=btn;}
  btn.addEventListener("click",()=>{
    state.preset=id;
    if(activeBtn)activeBtn.classList.remove("active");
    btn.classList.add("active");
    activeBtn=btn;
    send();
  });
  grid.appendChild(btn);
});

// ─── Colour wheel ────────────────────────────────────────────────────────────

function hsvToRgb(h,s,v){
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
}

function drawWheel(h,s){
  const canvas=document.getElementById("color-wheel");
  const dpr=window.devicePixelRatio||1;
  const css=canvas.offsetWidth;
  if(!css)return;
  // Resizing resets context state — do it every frame for simplicity
  canvas.width=Math.round(css*dpr);
  canvas.height=Math.round(css*dpr);
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr); // work in CSS pixel coords throughout
  const cx=css/2,cy=css/2,r=cx-6;

  // Hue + saturation inside circle clip
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.clip();

  // Conic gradient: red at top (12 o'clock), clockwise
  const hg=ctx.createConicGradient(-Math.PI/2,cx,cy);
  hg.addColorStop(0,"#f00");hg.addColorStop(1/6,"#ff0");hg.addColorStop(2/6,"#0f0");
  hg.addColorStop(3/6,"#0ff");hg.addColorStop(4/6,"#00f");hg.addColorStop(5/6,"#f0f");
  hg.addColorStop(1,"#f00");
  ctx.fillStyle=hg;ctx.fillRect(0,0,css,css);

  // Radial white overlay: white at centre → transparent at edge (saturation axis)
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  sg.addColorStop(0,"rgba(255,255,255,1)");sg.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=sg;ctx.fillRect(0,0,css,css);
  ctx.restore();

  // Thumb — outside clip so it can sit right at the edge
  const ta=h*Math.PI/180-Math.PI/2; // hue 0 → top, clockwise
  const tx=cx+s*r*Math.cos(ta);
  const ty=cy+s*r*Math.sin(ta);
  ctx.beginPath();ctx.arc(tx,ty,10,0,2*Math.PI);
  ctx.strokeStyle="rgba(0,0,0,.65)";ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(tx,ty,10,0,2*Math.PI);
  ctx.strokeStyle="rgba(255,255,255,.92)";ctx.lineWidth=1.5;ctx.stroke();
}

function applyWheelPoint(clientX,clientY){
  const canvas=document.getElementById("color-wheel");
  const rect=canvas.getBoundingClientRect();
  const css=canvas.offsetWidth;
  const cx=css/2,cy=css/2,r=cx-6;
  const dx=clientX-rect.left-cx;
  const dy=clientY-rect.top-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const s=Math.min(dist/r,1);
  // atan2 gives angle from right; shift by +PI/2 so 0 = top, clockwise
  let h=(Math.atan2(dy,dx)+Math.PI/2)*180/Math.PI;
  if(h<0)h+=360;
  if(h>=360)h-=360;
  wheelH=h;wheelS=s;
  const {r:rv,g,b}=hsvToRgb(h,s,1);
  state.r=rv;state.g=g;state.b=b;
  const hex="#"+[rv,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
  document.getElementById("col-hex").textContent=hex;
  drawWheel(h,s);
  debouncedSend();
}

const wc=document.getElementById("color-wheel");
// Mouse
wc.addEventListener("mousedown",e=>{
  applyWheelPoint(e.clientX,e.clientY);
  const move=e2=>applyWheelPoint(e2.clientX,e2.clientY);
  window.addEventListener("mousemove",move);
  window.addEventListener("mouseup",()=>window.removeEventListener("mousemove",move),{once:true});
});
// Touch
wc.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0];applyWheelPoint(t.clientX,t.clientY);},{passive:false});
wc.addEventListener("touchmove", e=>{e.preventDefault();const t=e.touches[0];applyWheelPoint(t.clientX,t.clientY);},{passive:false});

// Draw on load and on resize
requestAnimationFrame(()=>drawWheel(wheelH,wheelS));
window.addEventListener("resize",()=>drawWheel(wheelH,wheelS));

// ─── Sliders ─────────────────────────────────────────────────────────────────

document.getElementById("sl-int").addEventListener("input",e=>{
  state.intensity=+e.target.value;
  document.getElementById("val-int").textContent=state.intensity;
  debouncedSend();
});
document.getElementById("sl-spd").addEventListener("input",e=>{
  state.speed=+e.target.value;
  document.getElementById("val-spd").textContent=state.speed;
  debouncedSend();
});
document.getElementById("device-sel").addEventListener("change",e=>{
  state.device=+e.target.value;
});

function debouncedSend(){
  clearTimeout(debounce);
  debounce=setTimeout(send,100);
}

// ─── ACK UI ──────────────────────────────────────────────────────────────────

function updateAckBtn(){
  const btn=document.getElementById("ack-btn");
  btn.className=ackMode?"ack-btn on":"ack-btn";
  btn.textContent=ackMode?"ACK ON":"ACK OFF";
}

function updateBatBars(dev,pct){
  const c=document.getElementById("ep-bat-"+dev);
  if(!c)return;
  const filled=pct===255?0:pct>=80?5:pct>=60?4:pct>=40?3:pct>=20?2:1;
  const col=pct!==255&&pct<20?"#ff5555":pct<40?"#ffbb44":"#66ff66";
  const bars=c.children;
  for(let i=0;i<5;i++){bars[i].style.background=i<filled?col:"rgba(0,0,0,0.25)";}
}

function updateRssiBars(dev,rssi){
  const c=document.getElementById("ep-rssi-"+dev);
  if(!c)return;
  const level=rssi>=-55?4:rssi>=-70?3:rssi>=-85?2:rssi>=-100?1:0;
  const col=level>=3?"#4caf50":level>=2?"#ff9800":"#ff5555";
  const bars=c.children;
  for(let i=0;i<4;i++){bars[i].style.background=i<level?col:"rgba(0,0,0,0.25)";}
}

// Detail popup — tap dot to open, tap again or outside to dismiss
const popup=document.getElementById("ep-popup");
document.addEventListener("click",e=>{
  if(!e.target.closest("#ep-popup")&&!e.target.closest(".ep-dot")){
    popup.style.display="none";popupDev=null;
  }
});

function renderPopup(dev){
  const info=lastAckStatus[dev];
  if(!info)return;
  const batStr=info.bat!==255?info.bat+"%":"N/A";
  document.getElementById("ep-popup-title").textContent="Device "+dev;
  document.getElementById("ep-popup-row1").innerHTML=
    "RSSI: <span>"+info.rssi+" dBm</span> &nbsp;&nbsp; Battery: <span>"+batStr+"</span>";
  document.getElementById("ep-popup-row2").innerHTML=
    "Last ACK: <span>"+info.age+"s ago</span>";
}

function showEpPopup(dev){
  if(popupDev===dev){popup.style.display="none";popupDev=null;return;}
  if(!lastAckStatus[dev])return;
  popupDev=dev;
  renderPopup(dev);
  popup.style.display="block";
}

function toggleAck(){
  fetch("/config",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ack_mode:!ackMode})
  }).then(r=>r.json()).then(d=>{
    ackMode=d.ack_mode;
    updateAckBtn();
  }).catch(()=>{});
}

// ─── Send + status ────────────────────────────────────────────────────────────

const PRESET_NAMES=Object.fromEntries(PRESETS.map(([id,name])=>[id,name]));

function send(){
  fetch("/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      device:state.device,preset:state.preset,intensity:state.intensity,
      r:state.r,g:state.g,b:state.b,speed:state.speed
    })
  }).then(r=>r.json()).then(()=>{
    const devLabel=state.device===0?"Broadcast":"Device "+state.device;
    document.getElementById("st-last").textContent=
      (PRESET_NAMES[state.preset]||"?")+" \u2022 "+devLabel;
  }).catch(()=>{});
}

function pollStatus(){
  fetch("/status").then(r=>r.json()).then(d=>{
    document.getElementById("dot-eth").className="dot"+(d.eth_link?" ok":"");
    document.getElementById("dot-wifi").className="dot"+(d.wifi_clients>0?" ok":" warn");
    document.getElementById("st-eth").textContent=d.eth_link?"linked":"no link";
    document.getElementById("st-wifi").textContent=d.wifi_clients+" client"+(d.wifi_clients!==1?"s":"");
    if(d.ack_mode!==undefined&&d.ack_mode!==ackMode){ackMode=d.ack_mode;updateAckBtn();}
    if(d.ack_status){
      const c=document.getElementById("ep-dots");
      for(const[idStr,info]of Object.entries(d.ack_status)){
        if(!info)continue;
        const dev=parseInt(idStr);
        lastAckStatus[dev]=info;
        if(!seenDevices.has(dev)){
          seenDevices.add(dev);
          const b=document.createElement("div");
          b.className="ep-dot";b.id="ep-dot-"+dev;b.dataset.dev=dev;
          b.addEventListener("click",e=>{e.stopPropagation();showEpPopup(dev);});
          const numEl=document.createElement("span");numEl.textContent=dev;b.appendChild(numEl);
          const batEl=document.createElement("div");batEl.className="ep-bat";batEl.id="ep-bat-"+dev;
          for(let i=0;i<5;i++){const bar=document.createElement("span");bar.className="ep-bar";batEl.appendChild(bar);}
          b.appendChild(batEl);
          const rssiEl=document.createElement("div");rssiEl.className="ep-rssi";rssiEl.id="ep-rssi-"+dev;
          for(let i=0;i<4;i++){
            const bar=document.createElement("span");bar.className="ep-rssi-bar";
            bar.style.height=(3+i*2)+"px";rssiEl.appendChild(bar);
          }
          b.appendChild(rssiEl);
          let placed=false;
          for(const ch of c.children){if(+(ch.dataset.dev)>dev){c.insertBefore(b,ch);placed=true;break;}}
          if(!placed)c.appendChild(b);
        }
        const dot=document.getElementById("ep-dot-"+dev);
        if(dot){
          dot.className="ep-dot"+(info.age<30?" green":info.age<60?" amber":"");
          updateBatBars(dev,info.bat!==undefined?info.bat:255);
          updateRssiBars(dev,info.rssi!==undefined?info.rssi:-120);
        }
      }
      for(const dev of seenDevices){
        if(!d.ack_status[String(dev)]){
          const dot=document.getElementById("ep-dot-"+dev);
          if(dot){dot.className="ep-dot";updateBatBars(dev,255);updateRssiBars(dev,-120);}
          delete lastAckStatus[dev];
        }
      }
      if(popupDev!==null)renderPopup(popupDev);
    }
  }).catch(()=>{
    document.getElementById("dot-eth").className="dot";
    document.getElementById("dot-wifi").className="dot";
  });
}
pollStatus();
setInterval(pollStatus,2000);
</script>
</body>
</html>
